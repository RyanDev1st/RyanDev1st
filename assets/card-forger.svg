<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 760 380" width="760" height="380" font-family="'Segoe UI',-apple-system,Helvetica,Arial,sans-serif" role="img" aria-label="FORGER — SkillRouter, tool orchestration">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8C6B2E"/><stop offset="1" stop-color="#E4C77E"/>
    </linearGradient>
  </defs>
  <rect width="760" height="380" rx="6" fill="#0B0A08"/>
  <rect x="0.5" y="0.5" width="759" height="379" rx="6" fill="none" stroke="#C9A24B" stroke-opacity="0.18"/>
  <!-- corner ticks -->
  <g stroke="#C9A24B" stroke-opacity="0.5" stroke-width="1.5">
    <path d="M20 14 H40 M20 14 V34"/><path d="M740 14 H720 M740 14 V34"/>
    <path d="M20 366 H40 M20 366 V346"/><path d="M740 366 H720 M740 366 V346"/>
  </g>

  <text x="40" y="64" font-family="Georgia,'Times New Roman',serif" font-size="38" font-weight="600" fill="#ECE6DA">FORGER</text>
  <text x="42" y="90" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="12.5" letter-spacing="2.5" fill="#C9A24B">SKILLROUTER &#183; TOOL ORCHESTRATION</text>

  <!-- diagram -->
  <g font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="13">
    <!-- connectors -->
    <g stroke="url(#g1)" stroke-width="1.6" fill="none" stroke-opacity="0.8">
      <line x1="150" y1="225" x2="300" y2="225"/>
      <path d="M390 225 C 470 225 470 150 560 150"/>
      <path d="M390 225 H560"/>
      <path d="M390 225 C 470 225 470 300 560 300"/>
    </g>
    <!-- input -->
    <circle cx="120" cy="225" r="8" fill="none" stroke="#8A8275"/>
    <text x="120" y="262" fill="#8A8275" text-anchor="middle">intent</text>
    <!-- router -->
    <rect x="300" y="200" width="90" height="50" rx="4" fill="#15120C" stroke="url(#g1)"/>
    <text x="345" y="230" fill="#E4C77E" text-anchor="middle" letter-spacing="1">ROUTER</text>
    <!-- travelling packet -->
    <circle r="3.5" fill="#F4E6BE">
      <animateMotion dur="2.4s" repeatCount="indefinite" path="M120 225 H300" keyTimes="0;0.7;1" keyPoints="0;1;1" calcMode="linear"/>
    </circle>
    <!-- outputs -->
    <g text-anchor="start" fill="#ECE6DA">
      <circle cx="560" cy="150" r="6" fill="#E4C77E"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="0s" repeatCount="indefinite"/></circle>
      <text x="576" y="155">skills</text>
      <circle cx="560" cy="225" r="6" fill="#E4C77E"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="1s" repeatCount="indefinite"/></circle>
      <text x="576" y="230">tools</text>
      <circle cx="560" cy="300" r="6" fill="#E4C77E"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="2s" repeatCount="indefinite"/></circle>
      <text x="576" y="305">mcps</text>
    </g>
  </g>

  <text x="40" y="350" font-size="15" fill="#9A917F">Routes intent to the right tool — audited to the right few.</text>
  <text x="720" y="350" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#6E6757" text-anchor="end">JS</text>
</svg>
