<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 760 380" width="760" height="380" font-family="'Segoe UI',-apple-system,Helvetica,Arial,sans-serif" role="img" aria-label="llm-and-engine: tool-calling harness, train, eval">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8C6B2E"/><stop offset="1" stop-color="#E4C77E"/>
    </linearGradient>
    <marker id="arw" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#C9A24B"/>
    </marker>
  </defs>
  <rect width="760" height="380" rx="6" fill="#0B0A08"/>
  <rect x="0.5" y="0.5" width="759" height="379" rx="6" fill="none" stroke="#C9A24B" stroke-opacity="0.18"/>
  <g stroke="#C9A24B" stroke-opacity="0.5" stroke-width="1.5">
    <path d="M20 14 H40 M20 14 V34"/><path d="M740 14 H720 M740 14 V34"/>
    <path d="M20 366 H40 M20 366 V346"/><path d="M740 366 H720 M740 366 V346"/>
  </g>

  <text x="40" y="64" font-family="Georgia,'Times New Roman',serif" font-size="34" font-weight="600" fill="#ECE6DA">llm-and-engine</text>
  <text x="42" y="90" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="12.5" letter-spacing="2.5" fill="#C9A24B">TOOL-CALLING HARNESS &#183; TRAIN / EVAL</text>

  <!-- agent loop diagram -->
  <g font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="13" fill="#ECE6DA" text-anchor="middle">
    <!-- loop arcs -->
    <g stroke="url(#g2)" stroke-width="1.6" fill="none" marker-end="url(#arw)" stroke-opacity="0.85">
      <path id="loop" d="M380 140 A 110 90 0 0 1 470 290"/>
      <path d="M455 300 A 110 90 0 0 1 285 300"/>
      <path d="M270 290 A 110 90 0 0 1 360 140"/>
    </g>
    <!-- nodes -->
    <g>
      <circle cx="380" cy="135" r="26" fill="#15120C" stroke="url(#g2)"/><text x="380" y="139" fill="#E4C77E">think</text>
      <circle cx="478" cy="300" r="26" fill="#15120C" stroke="url(#g2)"/><text x="478" y="304" fill="#E4C77E">tool</text>
      <circle cx="282" cy="300" r="26" fill="#15120C" stroke="url(#g2)"/><text x="282" y="304" fill="#E4C77E">result</text>
    </g>
    <!-- orbiting packet -->
    <circle r="4" fill="#F4E6BE">
      <animateMotion dur="3.4s" repeatCount="indefinite"
        path="M380 140 A 110 90 0 0 1 470 290 M455 300 A 110 90 0 0 1 285 300 M270 290 A 110 90 0 0 1 360 140"/>
    </circle>
    <text x="380" y="228" fill="#6E6757" font-size="11" letter-spacing="2">LOOP</text>
  </g>

  <text x="40" y="350" font-size="15" fill="#9A917F">The scaffolding that makes models reliable: validated, recovered, grounded.</text>
  <text x="720" y="350" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#6E6757" text-anchor="end">PY</text>
</svg>
