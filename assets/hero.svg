<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" width="1280" height="440" role="img" aria-label="Ryan, AI engineer. Anyone can prompt. I engineer the harness.">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8C6B2E"/>
      <stop offset="0.5" stop-color="#E4C77E"/>
      <stop offset="1" stop-color="#C9A24B"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="50%" r="62%">
      <stop offset="0" stop-color="#C9A24B" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#C9A24B" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== Apple-style Liquid Glass (honest SVG approximation) ===== -->
    <!-- frost veil: light catch on top, denser toward the bottom so text stays legible -->
    <linearGradient id="lg-frost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#3A352A" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#15130E" stop-opacity="0.56"/>
      <stop offset="1"   stop-color="#0C0B09" stop-opacity="0.64"/>
    </linearGradient>
    <!-- specular sheen across the top third (the signature liquid-glass light edge) -->
    <linearGradient id="lg-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="0.42" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="1"    stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- rim: lit on top, shadowed on the bottom edge => 3D glass lip -->
    <linearGradient id="lg-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#FFFFFF" stop-opacity="0.62"/>
      <stop offset="0.5"  stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>
    <clipPath id="lg-clip"><rect x="52" y="312" width="616" height="60" rx="20"/></clipPath>
    <filter id="lg-refract" x="-20%" y="-40%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2.1"/>
    </filter>
    <filter id="lg-lift" x="-30%" y="-60%" width="160%" height="260%">
      <feDropShadow dx="0" dy="6" stdDeviation="11" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="lg-innershadow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dy="2" result="o"/>
      <feComposite in="SourceGraphic" in2="o" operator="out"/>
    </filter>

    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <style>
    .sans  { font-family: 'Segoe UI', -apple-system, Helvetica, Arial, sans-serif; }
    .mono  { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace; }
    .serif { font-family: Georgia, 'Times New Roman', serif; font-style: italic; }

    .kick, .glass, .sig { opacity: 0; }
    .kick  { animation: fade .7s ease .20s forwards; }
    .glass { animation: fade .9s ease 2.70s forwards; }
    .sig   { animation: fade .8s ease 3.00s forwards; }

    .l1 { animation: type1 .95s steps(18,end) .50s both; }
    .l2 { animation: type2 1.15s steps(23,end) 1.50s both; }
    @keyframes type1 { from { clip-path: inset(-25% 100% -25% 0); } to { clip-path: inset(-25% -2% -25% 0); } }
    @keyframes type2 { from { clip-path: inset(-25% 100% -25% 0); } to { clip-path: inset(-25% -2% -25% 0); } }

    .caret { opacity: 0; animation: blink 1.05s step-end 2.75s infinite; }
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }

    .flow { stroke-dasharray: 2200; animation: draw 1.9s cubic-bezier(.16,1,.3,1) .30s both; }
    @keyframes draw { from { stroke-dashoffset: 2200; } to { stroke-dashoffset: 0; } }

    .spark, .sparkglow {
      offset-path: path("M -40 332 C 260 252 460 472 720 302 S 1120 122 1340 202");
      animation: move 5.5s linear 2.40s infinite;
    }
    @keyframes move { from { offset-distance: 0%; } to { offset-distance: 100%; } }

    .n1 { animation: pulse 3.2s ease 0s   infinite; }
    .n2 { animation: pulse 3.2s ease .8s  infinite; }
    .n3 { animation: pulse 3.2s ease 1.6s infinite; }
    .n4 { animation: pulse 3.2s ease 2.4s infinite; }
    @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }

    @keyframes fade { to { opacity: 1; } }

    @media (prefers-reduced-motion: reduce) {
      .kick,.glass,.sig { opacity: 1; animation: none; }
      .l1,.l2 { animation: none; clip-path: none; }
      .flow { animation: none; stroke-dashoffset: 0; }
      .spark,.sparkglow { animation: none; display: none; }
      .caret { animation: none; opacity: 1; }
      .n1,.n2,.n3,.n4 { animation: none; opacity: 1; }
    }
  </style>

  <rect width="1280" height="440" fill="#0B0A08"/>
  <rect width="1280" height="440" fill="url(#glow)"/>

  <path class="flow" d="M -40 332 C 260 252 460 472 720 302 S 1120 122 1340 202"
        fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  <circle class="sparkglow" r="9" fill="#E4C77E" opacity="0.45" filter="url(#soft)"/>
  <circle class="spark" r="3.5" fill="#F4E6BE"/>

  <g fill="none" stroke="#C9A24B" stroke-opacity="0.3" stroke-width="1">
    <line x1="1040" y1="120" x2="1130" y2="92"/>
    <line x1="1040" y1="120" x2="1112" y2="186"/>
    <line x1="1130" y1="92" x2="1190" y2="150"/>
    <line x1="1112" y1="186" x2="1190" y2="150"/>
  </g>
  <g fill="#E4C77E">
    <circle class="n1" cx="1040" cy="120" r="4"/>
    <circle class="n2" cx="1130" cy="92"  r="4"/>
    <circle class="n3" cx="1190" cy="150" r="4"/>
    <circle class="n4" cx="1112" cy="186" r="4"/>
  </g>

  <text class="kick mono" x="64" y="120" font-size="14" letter-spacing="5" fill="#C9A24B">AI&#160;ENGINEER<tspan fill="#6E6757">&#160;&#160;&#183;&#160;&#160;</tspan><tspan fill="#9A917F">HARNESS / CONTEXT / TOOLING</tspan></text>

  <text class="l1 sans" x="62" y="208" font-size="50" font-weight="600" fill="#ECE6DA">Anyone can prompt.</text>
  <text class="l2 sans" x="62" y="278" font-size="50" font-weight="600" fill="#ECE6DA">I engineer the <tspan class="serif" font-weight="500" fill="#E4C77E">harness.</tspan><tspan class="caret" font-weight="400" fill="#E4C77E" dx="6">&#9612;</tspan></text>

  <!-- ===== Liquid Glass subline ===== -->
  <g class="glass">
    <!-- lift -->
    <rect x="52" y="312" width="616" height="60" rx="20" fill="#000000" fill-opacity="0.001" filter="url(#lg-lift)"/>
    <g clip-path="url(#lg-clip)">
      <!-- refracted gold line: bent + magnified + blurred, as if seen through the lens -->
      <path d="M -40 332 C 260 252 460 472 720 302 S 1120 122 1340 202"
            fill="none" stroke="#F0DEA8" stroke-width="3.4" stroke-linecap="round"
            transform="translate(0,7) scale(1,1.06)" filter="url(#lg-refract)" opacity="0.9"/>
      <!-- frost veil -->
      <rect x="52" y="312" width="616" height="60" fill="url(#lg-frost)"/>
      <!-- specular sheen on the top third -->
      <rect x="52" y="312" width="616" height="60" fill="url(#lg-sheen)"/>
      <!-- soft top-left light blob -->
      <ellipse cx="150" cy="318" rx="150" ry="22" fill="#FFFFFF" opacity="0.10" filter="url(#soft)"/>
    </g>
    <!-- lit / shadowed rim -->
    <rect x="52.5" y="312.5" width="615" height="59" rx="19.5" fill="none" stroke="url(#lg-rim)" stroke-width="1.1"/>
    <!-- bright top hairline highlight -->
    <path d="M 74 313.4 H 646" stroke="#FFFFFF" stroke-opacity="0.45" stroke-width="1" stroke-linecap="round"/>
    <!-- text -->
    <text class="sans" x="74" y="349" font-size="17.5" fill="#F6F1E6">I tune the loop, not just the prompt. Then I design the web to <tspan class="serif" fill="#E9CF86">feel.</tspan></text>
  </g>

  <text class="sig mono" x="64" y="408" font-size="13" letter-spacing="3" fill="#6E6757">RYANDEV1ST</text>
</svg>
