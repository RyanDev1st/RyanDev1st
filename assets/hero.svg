<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 440" width="1280" height="440" font-family="'Segoe UI', -apple-system, Helvetica, Arial, sans-serif" role="img" aria-label="Ryan — AI engineer. Anyone can prompt. I engineer the harness.">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8C6B2E"/>
      <stop offset="0.5" stop-color="#E4C77E"/>
      <stop offset="1" stop-color="#C9A24B"/>
    </linearGradient>
    <radialGradient id="glow" cx="32%" cy="52%" r="60%">
      <stop offset="0" stop-color="#C9A24B" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#C9A24B" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- canvas -->
  <rect width="1280" height="440" fill="#0B0A08"/>
  <rect width="1280" height="440" fill="url(#glow)"/>

  <!-- structural hairlines (system grid) -->
  <g stroke="#ECE6DA" stroke-opacity="0.04" stroke-width="1">
    <line x1="64" y1="0" x2="64" y2="440"/>
    <line x1="1216" y1="0" x2="1216" y2="440"/>
    <line x1="0" y1="64" x2="1280" y2="64"/>
    <line x1="0" y1="376" x2="1280" y2="376"/>
  </g>

  <!-- the liquid line -->
  <path id="flow" d="M -40 330 C 260 250 460 470 720 300 S 1120 120 1340 200"
        fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"
        stroke-dasharray="2200" stroke-dashoffset="2200">
    <animate attributeName="stroke-dashoffset" from="2200" to="0" begin="0.3s" dur="1.9s"
             fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1" values="2200;0"/>
  </path>

  <!-- travelling node on the line -->
  <g>
    <circle r="9" fill="#E4C77E" opacity="0.5" filter="url(#soft)">
      <animateMotion dur="5s" begin="1.8s" repeatCount="indefinite" rotate="auto">
        <mpath xlink:href="#flow"/>
      </animateMotion>
    </circle>
    <circle r="3.5" fill="#F4E6BE">
      <animateMotion dur="5s" begin="1.8s" repeatCount="indefinite" rotate="auto">
        <mpath xlink:href="#flow"/>
      </animateMotion>
    </circle>
  </g>

  <!-- system constellation (upper right) -->
  <g stroke="#C9A24B" stroke-opacity="0.35" stroke-width="1" fill="none">
    <line x1="1040" y1="120" x2="1130" y2="92"/>
    <line x1="1040" y1="120" x2="1112" y2="186"/>
    <line x1="1130" y1="92" x2="1190" y2="150"/>
    <line x1="1112" y1="186" x2="1190" y2="150"/>
  </g>
  <g fill="#E4C77E">
    <circle cx="1040" cy="120" r="4"><animate attributeName="opacity" values="0.35;1;0.35" dur="3.2s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="92"  r="4"><animate attributeName="opacity" values="0.35;1;0.35" dur="3.2s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="1190" cy="150" r="4"><animate attributeName="opacity" values="0.35;1;0.35" dur="3.2s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="1112" cy="186" r="4"><animate attributeName="opacity" values="0.35;1;0.35" dur="3.2s" begin="2.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- kicker -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.7s" fill="freeze"/>
    <text x="64" y="132" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace"
          font-size="14" letter-spacing="5" fill="#C9A24B">AI&#160;ENGINEER<tspan fill="#8A8275">&#160;&#160;/&#160;&#160;HARNESS&#160;&#183;&#160;CONTEXT&#160;&#183;&#160;TOOLING</tspan></text>
  </g>

  <!-- headline line 1 -->
  <g opacity="0">
    <animateTransform attributeName="transform" type="translate" from="0 22" to="0 0" begin="0.55s" dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1" values="0 22;0 0"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.55s" dur="0.8s" fill="freeze"/>
    <text x="62" y="222" font-size="50" font-weight="600" fill="#ECE6DA">Anyone can prompt.</text>
  </g>

  <!-- headline line 2 -->
  <g opacity="0">
    <animateTransform attributeName="transform" type="translate" from="0 22" to="0 0" begin="0.85s" dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1" values="0 22;0 0"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.85s" dur="0.8s" fill="freeze"/>
    <text x="62" y="296" font-size="52" font-weight="600" fill="#ECE6DA">I engineer the <tspan font-family="Georgia,'Times New Roman',serif" font-style="italic" font-weight="500" fill="#E4C77E">harness.</tspan></text>
  </g>

  <!-- subline -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.9s" fill="freeze"/>
    <text x="64" y="348" font-size="19" fill="#9A917F">Tuning the loop — not just the prompt. Then designing the web to <tspan font-family="Georgia,'Times New Roman',serif" font-style="italic" fill="#C9A24B">feel.</tspan></text>
  </g>

  <!-- signature -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.9s" fill="freeze"/>
    <text x="64" y="410" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="13" letter-spacing="3" fill="#6E6757">RYANDEV1ST</text>
    <rect x="172" y="399" width="9" height="14" fill="#C9A24B">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite" keyTimes="0;0.5;0.5;1"/>
    </rect>
  </g>
</svg>
